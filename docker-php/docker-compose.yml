services:
  apache:
    build: ./apache
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8095}:80"
    depends_on:
      - php_8_4
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost/ >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    volumes:
      - ./projects:/var/www
      - ./apache/conf:/usr/local/apache2/conf/overwrite:ro
    working_dir: /var/www

  php_8_4:
    build: ./php_8_4
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./php/php.ini:/usr/local/etc/php/conf.d/php-override.ini:ro
      - ./projects:/var/www
    working_dir: /var/www/inf-backend
